<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Noughts & Crosses</title>
</head>
<body>
    
    <div id="container" action="post">
        <form>
            <div id="inputs">
                <label for="X-name">Name (X):</label>
                <input type="text" required id="X-Name" name="X-Name" maxlength="30">
                <label for="O-name">Name (O):</label>
                <input type="text" required id="O-Name" name="O-Name" maxlength="30">
            </div>
            <button type="submit" id="start">Start</button>
        </form>
        <p id="display"></p>
        <div id="board">
            <button type="button" data-row = "0" data-column="0"></button>
            <button type="button" data-row = "0" data-column="1"></button>
            <button type="button" data-row = "0" data-column="2"></button>
            <button type="button" data-row = "1" data-column="0"></button>
            <button type="button" data-row = "1" data-column="1"></button>
            <button type="button" data-row = "1" data-column="2"></button>
            <button type="button" data-row = "2" data-column="0"></button>
            <button type="button" data-row = "2" data-column="1"></button>
            <button type="button" data-row = "2" data-column="2"></button>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
